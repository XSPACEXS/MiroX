<svg width="540" height="380" viewBox="0 0 540 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD600" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD600" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="540" height="380" fill="url(#bg)"/>
  <!-- Subtle yellow stripe -->
  <rect x="0" y="160" width="540" height="80" fill="url(#stripe)"/>
  <!-- MiroX logo -->
  <text x="270" y="60" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFD600" text-anchor="middle">MiroX</text>
  <!-- Subtitle -->
  <text x="270" y="90" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">Enterprise Miro Board Launcher</text>
  <!-- Instruction arrows -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">MiroX.app</text>
  <text x="390" y="320" font-family="Arial, sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">Applications</text>
  <!-- Arrow -->
  <line x1="220" y1="200" x2="310" y2="200" stroke="#FFD600" stroke-width="2" opacity="0.6"/>
  <polygon points="315,200 305,195 305,205" fill="#FFD600" opacity="0.6"/>
</svg>
