<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg-gradient)"/>
  <!-- Yellow glow behind M -->
  <ellipse cx="256" cy="256" rx="140" ry="130" fill="#FFD600" opacity="0.08" filter="url(#glow)"/>
  <!-- M letter -->
  <text
    x="256" y="330"
    font-family="Arial Black, Impact, sans-serif"
    font-size="280"
    font-weight="900"
    fill="#FFD600"
    text-anchor="middle"
    filter="url(#glow)"
  >M</text>
  <!-- X subscript -->
  <text
    x="390" y="370"
    font-family="Arial Black, Impact, sans-serif"
    font-size="120"
    font-weight="900"
    fill="#FFD600"
    opacity="0.9"
    text-anchor="middle"
  >X</text>
  <!-- Subtle border glow -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#FFD600" stroke-width="2" opacity="0.15"/>
</svg>
